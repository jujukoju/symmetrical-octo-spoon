name: NINAuth-System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-oracle-and-ml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r oracle-api/requirements.txt
        pip install pytest
        
    - name: Run FastAPI & ML Integration Tests
      env:
        AES_MASTER_KEY: ${{ secrets.TEST_AES_KEY }}
      run: |
        cd oracle-api
        pytest tests/

  test-smart-contracts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - name: Install Hardhat Dependencies
      run: |
        cd blockchain
        npm install
        
    - name: Run Solidity Unit Tests
      run: |
        cd blockchain
        npx hardhat test