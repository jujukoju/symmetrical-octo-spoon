name: NINAuth Core Verification Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Development Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'
        cache: 'pip'

    - name: Install Linting Tools
      run: pip install ruff cryptography

    - name: Enforce Strict Code Quality Formatting Rules (Ruff)
      run: ruff check oracle_api/ ml-backend/

    - name: Audit Core Source Cryptographic Integrity Markers
      run: python -m compileall oracle_api/

  integration-tests:
    needs: lint-and-audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Development Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Inject Mock Pipeline Security Environment Variables
      run: |
        echo "AES_MASTER_KEY=11223344556677889900aabbccddeeff11223344556677889900aabbccddeeff" >> $GITHUB_ENV
        echo "VERIFY_THRESHOLD=0.35" >> $GITHUB_ENV
        echo "ENV=test" >> $GITHUB_ENV

    - name: Install System Dependencies for Headless Image Inference
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libgl1-mesa-glx

    - name: Extract Pre-compiled CPU Wheels and API Drivers
      run: |
        pip install -r oracle_api/requirements.txt

    - name: Execute PyTest Integration and Unit Suites
      run: |
        cd oracle_api && pytest tests/ -v